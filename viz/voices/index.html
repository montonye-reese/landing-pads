<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voices · Landing Pads</title>
  <link rel="stylesheet" href="../../shared/style.css" />
  <style>
    /* Voice-grid-specific (scoped to this page) */
    .voice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .voice-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 1rem 1.1rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }
    .voice-card .voice-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .voice-card .voice-name {
      font-weight: 600;
      font-size: 1.05rem;
    }
    .voice-card .voice-full {
      color: var(--muted);
      font-size: 0.85rem;
    }
    .voice-card .ivic {
      font-size: 0.72rem;
      color: #c4c2bb;
      font-variant: tabular-nums;
    }
    .voice-card blockquote.voice-quote {
      font-family: "Source Serif 4", Georgia, serif;
      font-style: italic;
      font-size: 0.98rem;
      line-height: 1.4;
      border-left: 3px solid var(--accent-soft);
      padding-left: 0.75rem;
      color: #3d3d38;
      margin: 0.2rem 0 0.3rem;
    }
    .voice-card .quote-source {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: -0.2rem;
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin: 0.15rem 0;
    }
    .chip {
      font-size: 0.78rem;
      background: var(--code-bg);
      padding: 0.12rem 0.5rem;
      border-radius: 10px;
    }
    .chip.anti { background: #fde9e3; color: var(--warn); }
    .chip.mistaken { background: #fef3d9; color: #8a6b08; }
    .chip-label {
      font-size: 0.7rem;
      color: var(--muted);
      font-variant: small-caps;
      letter-spacing: 0.05em;
      margin-right: 0.2rem;
      align-self: center;
    }
    .voice-card details summary {
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    .voice-card details[open] summary { color: var(--accent); }
    .voice-card .bio-text {
      font-size: 0.88rem;
      line-height: 1.5;
      margin-top: 0.5rem;
      color: #3d3d38;
    }

    /* Canonical prompts section */
    .canonical-prompts blockquote {
      border-left: 3px solid var(--accent-soft);
      padding: 0.4rem 0.85rem;
      margin: 0.4rem 0 0.7rem;
      background: var(--surface);
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .canonical-prompts h3 {
      margin-top: 1rem;
      font-size: 0.95rem;
      font-variant: small-caps;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .canonical-prompts .prompt-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: -0.2rem;
    }
    .canonical-prompts .silent-tag {
      font-size: 0.7rem;
      background: #f0ede5;
      color: var(--muted);
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
      font-variant: small-caps;
      letter-spacing: 0.05em;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      margin: 0.5rem 0 0.3rem;
      color: var(--muted);
    }
    .canonical-prompts code {
      background: var(--code-bg);
      padding: 0 0.3rem;
      border-radius: 3px;
      font-size: 0.85rem;
    }
    /* "click to expand" hint: small + background */
    .canonical-prompts summary small {
      font-size: 0.7rem;
      color: #b0aea7;
      font-weight: 400;
      margin-left: 0.35rem;
    }
    /* System prompt section: in the background, less prominent than Anneal / Gauntlet */
    .canonical-prompts details.subtle-section > summary {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 400;
    }
    .canonical-prompts details.subtle-section blockquote {
      font-size: 0.9rem;
      color: #555;
    }
    /* System prompt: subtle, lives up in the hero space, no triangle */
    .system-prompt-mount {
      margin: 0.6rem 0 1.3rem;
    }
    details.no-triangle > summary {
      list-style: none;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 400;
    }
    details.no-triangle > summary::-webkit-details-marker { display: none; }
    details.no-triangle > summary::marker { display: none; }
    details.no-triangle[open] > summary { color: var(--accent); }
    details.no-triangle blockquote {
      border-left: 3px solid var(--accent-soft);
      padding: 0.4rem 0.85rem;
      margin: 0.4rem 0 0.3rem;
      background: var(--surface);
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 0.9rem;
      line-height: 1.45;
      color: #555;
    }
    details.no-triangle .prompt-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }
    /* Tiny inline silent-note under F2 */
    .silent-note {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: -0.4rem;
      margin-bottom: 0.8rem;
      font-style: italic;
    }

    /* ---- Prompt cards (Anneal, Gauntlet w/ voices inside) ---- */
    .prompt-cards { margin-top: 1rem; }
    .prompt-card {
      background: #f5f3ec;
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 1rem 1.25rem 1.25rem;
      margin: 0 0 1.4rem;
    }
    .prompt-card-label {
      font-size: 0.72rem;
      font-variant: small-caps;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.6rem;
      font-weight: 500;
    }
    .prompt-card-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
      flex-wrap: nowrap;
    }
    .prompt-card-header .prompt-card-label {
      margin-bottom: 0;
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .prompt-card-caption {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 400;
    }
    .prompt-card-header .prompt-card-caption::before {
      content: "·";
      margin-right: 0.45rem;
      color: var(--muted);
    }
    .prompt-card blockquote {
      border-left: 3px solid var(--accent-soft);
      padding: 0.4rem 0.85rem;
      margin: 0.4rem 0 0.7rem;
      background: var(--surface);
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .prompt-card h3 {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      font-variant: small-caps;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .prompt-card .prompt-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: -0.3rem;
    }
    .prompt-card code {
      background: var(--code-bg);
      padding: 0 0.3rem;
      border-radius: 3px;
      font-size: 0.85rem;
    }
    /* Pseudocode loop in the Gauntlet card */
    .chassis-loop {
      margin: 0.7rem 0 0.3rem;
    }
    .chassis-loop .loop-header {
      font-size: 0.82rem;
      color: var(--muted);
      font-variant: small-caps;
      letter-spacing: 0.06em;
      margin-bottom: 0.35rem;
    }
    .chassis-loop .loop-body {
      margin-left: 1.2rem;
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 0.95rem;
      line-height: 1.45;
      color: var(--ink);
      padding-left: 0.7rem;
      border-left: 2px solid var(--accent-soft);
    }
    .chassis-loop .ph {
      font-family: "Inter", system-ui, sans-serif;
      font-style: italic;
      color: var(--muted);
      font-size: 0.92em;
    }

    /* Voices nested inside the gauntlet card */
    .voices-inset { margin-top: 1rem; }
    .voices-h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 0.2rem;
    }

    /* Show/hide prompts toggle */
    .prompts-toggle-row { margin: 0.6rem 0 0.8rem; }
    .toggle-prompts {
      font: inherit;
      font-size: 0.85rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 16px;
      padding: 0.25rem 0.95rem;
      cursor: pointer;
    }
    .toggle-prompts:hover { color: var(--ink); background: var(--code-bg); }
    .toggle-prompts[aria-pressed="true"] { color: var(--ink); }

    /* Sort control next to the prompts toggle */
    .prompts-toggle-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .sort-control {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .sort-control .sort-label {
      font-size: 0.72rem;
      font-variant: small-caps;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-right: 0.15rem;
    }
    .sort-btn {
      font: inherit;
      font-size: 0.78rem;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 0.12rem 0.6rem;
      cursor: pointer;
      color: var(--muted);
    }
    .sort-btn:hover:not(.active) { background: var(--code-bg); color: var(--ink); }
    .sort-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
    }
    .sort-btn.active::after {
      margin-left: 0.3rem;
      font-size: 0.6rem;
      opacity: 0.7;
    }
    .sort-btn.active[data-dir="desc"]::after { content: "▼"; }
    .sort-btn.active[data-dir="asc"]::after  { content: "▲"; }

    /* When prompts are hidden: anneal card disappears entirely (it's only prompts),
       gauntlet card hides its chassis-body but keeps the voices-inset visible. */
    .prompt-cards[data-show-prompts="false"] .prompt-card-anneal { display: none; }
    .prompt-cards[data-show-prompts="false"] .prompt-content { display: none; }
    .prompt-cards[data-show-prompts="false"] .voices-inset { margin-top: 0; }
    /* When hidden, gauntlet card's "Gauntlet" label still shows, sitting just above voices */

    /* Prompts pill: minimal "show prompts" affordance up top */
    .prompts-pill { margin: 0.4rem 0 1rem; }
    .prompts-pill > summary {
      display: inline-block;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--muted);
      padding: 0.25rem 0.85rem;
      border: 1px solid var(--rule);
      border-radius: 16px;
      background: var(--surface);
      list-style: none;
    }
    .prompts-pill > summary::-webkit-details-marker { display: none; }
    .prompts-pill > summary::marker { display: none; }
    .prompts-pill > summary::after {
      content: " ▸";
      color: #b0aea7;
      font-size: 0.75rem;
    }
    .prompts-pill[open] > summary::after { content: " ▾"; }
    .prompts-pill[open] > summary { color: var(--ink); }
    .prompts-content { margin-top: 0.6rem; }

    /* Segmented toggle: Main / All */
    .seg-toggle {
      display: inline-flex;
      border: 1px solid var(--rule);
      border-radius: 6px;
      overflow: hidden;
      margin: 0.2rem 0 1rem;
      font-size: 0.85rem;
    }
    .seg-btn {
      background: var(--surface);
      border: 0;
      padding: 0.3rem 0.95rem;
      cursor: pointer;
      color: var(--muted);
      font: inherit;
      border-right: 1px solid var(--rule);
    }
    .seg-btn:last-child { border-right: 0; }
    .seg-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
    }
    .seg-btn:hover:not(.active) { background: var(--code-bg); }

    /* Inside the unfurled prompts area: use the existing canonical-prompts blockquote style */
    #prompts-body blockquote {
      border-left: 3px solid var(--accent-soft);
      padding: 0.4rem 0.85rem;
      margin: 0.4rem 0 0.8rem;
      background: var(--surface);
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    #prompts-body h3 {
      margin-top: 1rem;
      font-size: 0.85rem;
      font-variant: small-caps;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    #prompts-body .prompt-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: -0.3rem;
    }
    #prompts-body code {
      background: var(--code-bg);
      padding: 0 0.3rem;
      border-radius: 3px;
      font-size: 0.85rem;
    }

    .data-error {
      background: #fde9e3;
      color: var(--warn);
      padding: 0.75rem 1rem;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .data-loading { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>

  <nav class="run-nav">
    <a href="../prompt-evolution/">← all runs</a>
    <span class="nav-mid">voices</span>
    <a href="https://github.com/montonye-reese/gauntlet">repo →</a>
  </nav>

  <div class="hero">
    <h1>Voices in the Gauntlet</h1>
  </div>

  <div class="system-prompt-mount">
    <details class="no-triangle">
      <summary>System prompt <small>(click to expand)</small></summary>
      <div id="system-prompt-body"><p class="data-loading">Loading...</p></div>
    </details>
  </div>

  <div class="prompts-toggle-row">
    <button class="toggle-prompts" type="button" aria-pressed="false">Show prompts</button>
    <span class="sort-control" role="group" aria-label="Sort voices">
      <span class="sort-label">sort</span>
      <button class="sort-btn active" data-sort="ivic" data-dir="desc" type="button">i_VIC</button>
      <button class="sort-btn" data-sort="alpha" type="button">A-Z</button>
    </span>
  </div>

  <section class="prompt-cards" data-show-prompts="false">

    <div class="prompt-card prompt-card-anneal">
      <div class="prompt-card-header">
        <div class="prompt-card-label">Anneal</div>
        <div class="prompt-card-caption">center the model to speak as itself, and ready it to revise</div>
      </div>
      <div class="prompt-content" id="anneal-card-body"><p class="data-loading">Loading...</p></div>
    </div>

    <div class="prompt-card prompt-card-gauntlet">
      <div class="prompt-card-label">Gauntlet</div>
      <div class="prompt-content" id="gauntlet-chassis-body"><p class="data-loading">Loading...</p></div>
      <div class="voices-inset">
        <p class="note" id="voice-count">Loading voices...</p>
        <div id="voice-grid" class="voice-grid"></div>
      </div>
    </div>

  </section>

  <footer class="run-footer" style="margin-top:3rem; padding-top:1rem; border-top:1px solid var(--rule); font-size:0.85rem; color:var(--muted);">
    <p>Suggesting a voice? Message Laura.</p>
  </footer>

  <script>
    // Relative to this file. Serve landing-pads/ (or any ancestor) as doc root, e.g.:
    //   cd ~/bench/research/landing-pads && python3 -m http.server 8000
    //   open http://localhost:8000/viz/voices/
    // Data lives at landing-pads/gauntlet/setup/ (sanitized public copy of gauntlet/setup/).
    const BASE = "../../gauntlet/setup";
    const URLS = {
      prompts:    BASE + "/prompts.canonical.json",
      bios:       BASE + "/voices.biographies.json",
      compressed: BASE + "/voices.compressed.json",
    };

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    async function loadAll() {
      try {
        const [pRes, bRes, cRes] = await Promise.all([
          fetch(URLS.prompts), fetch(URLS.bios), fetch(URLS.compressed)
        ]);
        for (const [name, res] of [["prompts", pRes], ["bios", bRes], ["compressed", cRes]]) {
          if (!res.ok) throw new Error(`${name}: HTTP ${res.status}`);
        }
        const prompts = await pRes.json();
        const bios = await bRes.json();
        const compressed = await cRes.json();
        renderCanonical(prompts);
        renderVoices(bios, compressed);
      } catch (e) {
        const errHtml = `<div class="data-error">Could not load data: ${escapeHtml(e.message)}.<br>Serve <code>landing-pads/</code> as the doc root: <code>cd landing-pads && python3 -m http.server 8000</code>, then open <code>http://localhost:8000/viz/voices/</code>.</div>`;
        document.getElementById("anneal-card-body").innerHTML = errHtml;
        document.getElementById("gauntlet-chassis-body").innerHTML = "";
        document.getElementById("system-prompt-body").innerHTML = "";
        document.getElementById("voice-grid").innerHTML = "";
        document.getElementById("voice-count").textContent = "";
      }
    }

    function renderCanonical(p) {
      const sys = p.system_prompt || {};
      const anneal = p.anneal || [];
      const f2 = p.gauntlet_launch || {};
      const chassis = p.voice_chassis || {};

      // System prompt stays in its own subtle slot up top.
      document.getElementById("system-prompt-body").innerHTML = `
        <blockquote>${escapeHtml(sys.text || "")}</blockquote>
        ${sys.note ? `<p class="prompt-meta">${escapeHtml(sys.note)}</p>` : ""}
      `;

      // Anneal card: the three centering questions, no labels, blockquote.
      document.getElementById("anneal-card-body").innerHTML = anneal.map(q => `
        <blockquote>${escapeHtml(q.text)}</blockquote>
      `).join("");

      // Gauntlet card: F2 text, then for-each pseudocode showing the chassis applied per voice.
      const chassisTemplate = escapeHtml(chassis.template || "")
        .replace(/\{voice_name\}/g, '<span class="ph">{voice}</span>')
        .replace(/\{bio\}/g, '<span class="ph">{bio}</span>');

      document.getElementById("gauntlet-chassis-body").innerHTML = `
        <blockquote>${escapeHtml(f2.text || "")}</blockquote>
        <div class="chassis-loop">
          <div class="loop-header">for each {voice}:</div>
          <div class="loop-body">${chassisTemplate}</div>
        </div>
      `;

      // Wire the show/hide prompts toggle.
      const btn = document.querySelector(".toggle-prompts");
      const cards = document.querySelector(".prompt-cards");
      btn.addEventListener("click", () => {
        const showing = cards.dataset.showPrompts === "true";
        cards.dataset.showPrompts = showing ? "false" : "true";
        btn.setAttribute("aria-pressed", showing ? "false" : "true");
        btn.textContent = showing ? "Show prompts" : "Hide prompts";
      });
    }

    // Module-scoped so the sort buttons can re-render without re-fetching.
    let _voiceData = null;
    let _sortMode = "ivic";
    let _sortDir = "desc";
    const SORT_DEFAULT_DIR = { ivic: "desc", alpha: "asc" };

    function sortSlugs(bios, mode, dir) {
      const slugs = Object.keys(bios);
      if (mode === "alpha") {
        slugs.sort((a, b) => {
          const aName = (bios[a].display_name || a).toLowerCase();
          const bName = (bios[b].display_name || b).toLowerCase();
          return aName.localeCompare(bName);
        });
      } else { // ivic, ascending baseline
        slugs.sort((a, b) => (bios[a].i_vic ?? 0) - (bios[b].i_vic ?? 0));
      }
      if (dir === "desc") slugs.reverse();
      return slugs;
    }

    function renderVoices(biosJson, compressedJson) {
      _voiceData = {
        bios: biosJson.voices || {},
        comp: compressedJson.voices || {},
      };
      doRenderVoices();

      document.querySelectorAll(".sort-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const clickedMode = btn.dataset.sort;
          if (clickedMode === _sortMode) {
            // Same button clicked: flip direction.
            _sortDir = _sortDir === "asc" ? "desc" : "asc";
          } else {
            // Different button: switch mode, reset to that mode's default direction.
            _sortMode = clickedMode;
            _sortDir = SORT_DEFAULT_DIR[clickedMode];
          }
          // Update active + data-dir on buttons.
          document.querySelectorAll(".sort-btn").forEach(b => {
            const isActive = b.dataset.sort === _sortMode;
            b.classList.toggle("active", isActive);
            if (isActive) b.setAttribute("data-dir", _sortDir);
            else b.removeAttribute("data-dir");
          });
          doRenderVoices();
        });
      });
    }

    function doRenderVoices() {
      if (!_voiceData) return;
      const { bios, comp } = _voiceData;
      const slugs = sortSlugs(bios, _sortMode, _sortDir);
      const grid = document.getElementById("voice-grid");
      const count = document.getElementById("voice-count");

      const cards = slugs.map(slug => {
        const b = bios[slug] || {};
        const c = comp[slug] || {};
        const valueChips = (c.values || []).filter(v => v).map(v => `<span class="chip">${escapeHtml(v)}</span>`).join("");
        const antiChips  = (c.anti_values || []).map(v => `<span class="chip anti">${escapeHtml(v)}</span>`).join("");
        const mistakenChips = (c.mistaken_goals || []).map(v => `<span class="chip mistaken">${escapeHtml(v)}</span>`).join("");
        const quoteHtml = c.quote ? `
          <blockquote class="voice-quote">${escapeHtml(c.quote)}</blockquote>
          ${c.quote_source ? `<p class="quote-source">${escapeHtml(c.quote_source)}</p>` : ""}
        ` : `<p class="quote-source"><em>no quote yet</em></p>`;

        const ivic = b.i_vic != null ? `<span class="ivic">${b.i_vic}</span>` : "";

        return `
          <article class="voice-card" data-slug="${escapeHtml(slug)}">
            <div class="voice-head">
              <div>
                <div class="voice-name">${escapeHtml(b.display_name || slug)}</div>
                ${b.full_name && b.full_name !== b.display_name ? `<div class="voice-full">${escapeHtml(b.full_name)}</div>` : ""}
              </div>
              ${ivic}
            </div>
            ${quoteHtml}
            ${valueChips ? `<div class="chip-row"><span class="chip-label">values</span>${valueChips}</div>` : ""}
            ${antiChips  ? `<div class="chip-row"><span class="chip-label">anti</span>${antiChips}</div>` : ""}
            ${mistakenChips ? `<div class="chip-row"><span class="chip-label">mistaken goals</span>${mistakenChips}</div>` : ""}
            ${b.bio ? `<details><summary>bio</summary><p class="bio-text">${escapeHtml(b.bio)}</p></details>` : ""}
          </article>
        `;
      }).join("");

      grid.innerHTML = cards;
      count.textContent = `${slugs.length} voices in the roster.`;
    }

    loadAll();
  </script>
</body>
</html>
